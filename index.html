          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
            <span style={{color:"var(--text3)"}}>{k}</span>
            <span style={{color:"var(--text)",fontFamily:"var(--font-mono)",fontSize:12}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:24,marginBottom:16}}>
        <div style={{fontFamily:"var(--font-cond)",fontWeight:700,fontSize:16,marginBottom:16}}>💾 Sauvegarde & Restauration</div>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:14}}>Exportez toutes vos données (prospects, projets, revenus, paiements) en JSON pour les sauvegarder ou les transférer.</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          <Btn variant="primary" onClick={exportAll}>📥 Exporter toutes les données (JSON)</Btn>
          <Btn variant="danger" size="sm" onClick={()=>{clearCreds();onDisconnect();}}>🔌 Déconnecter Supabase</Btn>
          <label><input type="file" accept=".json" onChange={importBackup} style={{display:"none"}}/><Btn variant="secondary" onClick={()=>{}}>📂 Restaurer un backup</Btn></label>
        </div>
      </div>
      <div style={{background:"var(--red-dim)",border:"1px solid var(--red)30",borderRadius:"var(--r2)",padding:24}}>
        <div style={{fontFamily:"var(--font-cond)",fontWeight:700,fontSize:16,marginBottom:8,color:"var(--red)"}}>⚠️ Zone Danger</div>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>Supprime <strong>toutes les données</strong> définitivement.</div>
        {!confirm?<Btn variant="danger" onClick={()=>setConfirm(true)}>🗑️ Effacer toutes les données</Btn>:(
          <div style={{display:"flex",gap:10}}>
            <Btn variant="ghost" onClick={()=>setConfirm(false)}>Annuler</Btn>
            <Btn variant="danger" onClick={()=>{localStorage.clear();addToast("✅ Données effacées. Rechargez la page.");setConfirm(false)}}>✔ Confirmer</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

alter table prospects enable row level security;
alter table projets enable row level security;
alter table revenus enable row level security;
alter table paiements enable row level security;
create policy "allow_all" on prospects for all to anon using (true) with check (true);
create policy "allow_all" on projets for all to anon using (true) with check (true);

function App(){
  const [tab,setTab]=useState("dashboard");
  const [prospects,setProspects]=useState([]);
  const [projets,setProjets]=useState([]);
  const [revenus,setRevenus]=useState([]);
  const [paiements,setPaiements]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [phase,setPhase]=useState("init");
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(false);
  const [isMobile,setIsMobile]=useState(typeof window!=="undefined"&&window.innerWidth<768);
  const [sideOpen,setSideOpen]=useState(typeof window!=="undefined"&&window.innerWidth>=768);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  useEffect(()=>{const h=()=>{const m=window.innerWidth<768;setIsMobile(m);if(m){setSideOpen(false);setMobileMenuOpen(false);}};window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
 
  const addToast=(msg,type="success")=>{const id=uid();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500)};
  useEffect(()=>{const c=getCreds();if(c){SB.init(c.u,c.k);setPhase("loading");}else setPhase("setup");},[]);
  useEffect(()=>{
    if(phase!=="loading")return;
    Promise.all([SB.getAll("prospects"),SB.getAll("projets"),SB.getAll("revenus"),SB.getAll("paiements")])
      .then(([p,pr,r,pai])=>{setProspects(p);setProjets(pr);setRevenus(r);setPaiements(pai);setPhase("app");})
      .catch(()=>{addToast("❌ Erreur Supabase. Vérifiez vos clés.","error");setPhase("setup");});
  },[phase]);
 
  const impayesCount=paiements.filter(p=>p.statutPaiement==="impaye"||p.statutPaiement==="partiel").length;
  const newProspects=prospects.filter(p=>p.statut==="nouveau").length;
 
  const TABS=[
    {id:"dashboard", label:"Vue Générale",    icon:"📊"},
    {id:"prospects", label:"Prospects CRM",   icon:"🎯", badge:newProspects>0?newProspects:null},
    {id:"projets",   label:"Projets",          icon:"💼"},
    {id:"paiements", label:"Paiements",        icon:"💳", badge:impayesCount>0?impayesCount:null, badgeColor:"var(--red)"},
    {id:"revenus",   label:"Revenus",          icon:"💰"},
    {id:"messages",  label:"Messages",         icon:"💬"},
    {id:"settings",  label:"Paramètres",       icon:"⚙️"},
  ];
 
  if(phase==="init")return null;
  if(phase==="setup")return<SetupScreen onConnected={()=>setPhase("loading")}/>;
  if(phase==="loading")return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"var(--bg)"}}><span className="spin" style={{fontSize:36,color:"var(--cyan)"}}>⟳</span><div style={{fontFamily:"var(--font-cond)",fontSize:16,color:"var(--text3)"}}>Connexion à Supabase & chargement...</div></div>;
  return(
    <div style={{display:"flex",height:"100vh",background:"var(--bg)",overflow:"hidden"}}>
      <Toast toasts={toasts}/>
 
      {/* MOBILE MENU OVERLAY */}
      {isMobile&&mobileMenuOpen&&<div onClick={()=>setMobileMenuOpen(false)} style={{position:"fixed",inset:0,background:"#000a",zIndex:300}}/>}
      {isMobile&&mobileMenuOpen&&<div onClick={()=>setMobileMenuOpen(false)} style={{position:"fixed",inset:0,background:"#000000aa",zIndex:400}}/>}
      {/* SIDEBAR */}
      <div style={{width:sideOpen?232:64,background:"var(--bg2)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",transition:"width .2s ease",overflow:"hidden",flexShrink:0,position:isMobile?"fixed":"relative",zIndex:isMobile?400:1,height:isMobile?"100vh":"auto",left:0,top:0,transform:isMobile&&!mobileMenuOpen?"translateX(-100%)":"translateX(0)"}}>
        <div style={{padding:sideOpen?"20px 18px 14px":"16px 0",borderBottom:"1px solid var(--border)",textAlign:sideOpen?"left":"center"}}>
          {sideOpen?(
            <div>
              <div style={{fontFamily:"var(--font-cond)",fontWeight:800,fontSize:14,letterSpacing:.5,textTransform:"uppercase"}}>Oumate Razakou</div>
              <div style={{fontSize:10,color:"var(--cyan)",marginTop:4,fontFamily:"var(--font-mono)",letterSpacing:1}}>IA · WEB · STREAMING</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}><span className="live"/><span style={{fontSize:10,color:"var(--text3)"}}>Lomé, Togo</span></div>
            </div>
          ):<div style={{fontFamily:"var(--font-cond)",fontWeight:800,fontSize:15,color:"var(--cyan)"}}>OR</div>}
        </div>
        <nav style={{flex:1,padding:"10px 6px",overflowY:"auto"}}>
          {TABS.map(t=>{
            const active=tab===t.id;
            return(
              <div key={t.id} onClick={()=>{setTab(t.id);if(isMobile){setMobileMenuOpen(false);setSideOpen(false);}}} style={{display:"flex",alignItems:"center",gap:10,padding:sideOpen?"10px 14px":"10px 0",justifyContent:sideOpen?"flex-start":"center",cursor:"pointer",borderRadius:"var(--r)",margin:"2px 2px",background:active?"var(--cyan-dim)":"transparent",color:active?"var(--cyan)":"var(--text3)",fontWeight:active?700:400,borderLeft:active&&sideOpen?"3px solid var(--cyan)":"3px solid transparent",transition:"all .15s",whiteSpace:"nowrap"}}>
                <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
                {sideOpen&&<span style={{fontSize:13,flex:1}}>{t.label}</span>}
                {sideOpen&&t.badge&&<span style={{background:t.badgeColor||"var(--red)",color:"#fff",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px",flexShrink:0}}>{t.badge}</span>}
              </div>
            );
          })}
        </nav>
        <div style={{padding:"8px 6px",borderTop:"1px solid var(--border)"}}>
          {sideOpen&&<div style={{padding:"6px 14px",marginBottom:4}}><a href={SITE_URL} target="_blank" style={{fontSize:10,color:"var(--cyan)",fontFamily:"var(--font-mono)",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🌐 {SITE_URL.replace("https://","")}</a></div>}
          <div onClick={()=>setSideOpen(!sideOpen)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",cursor:"pointer",color:"var(--text3)",borderRadius:"var(--r)",justifyContent:sideOpen?"flex-start":"center"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <span style={{fontSize:12}}>{sideOpen?"◀":"▶"}</span>
            {sideOpen&&<span style={{fontSize:11}}>Réduire</span>}
          </div>
        </div>
      </div>
 
      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:isMobile?"8px 12px":"14px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg2)",flexShrink:0,flexWrap:isMobile?"wrap":"nowrap",gap:isMobile?6:12}}>
          {isMobile&&<button onClick={()=>setMobileMenuOpen(!mobileMenuOpen)} style={{background:"var(--bg3)",color:"var(--text)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"6px 8px",cursor:"pointer",fontSize:14,fontFamily:"var(--font)",fontWeight:600}}>☰</button>}
          <span style={{fontFamily:"var(--font-cond)",fontSize:isMobile?14:18,fontWeight:700,letterSpacing:.3}}>{TABS.find(t=>t.id===tab)?.icon} {TABS.find(t=>t.id===tab)?.label}</span>
          <div style={{display:"flex",gap:isMobile?6:12,alignItems:"center",fontSize:isMobile?10:11,flexWrap:"wrap"}}>
            <SyncDot syncing={syncing} err={syncErr}/>
            {!isMobile&&<span style={{color:"var(--text3)"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})}</span>}
            {!isMobile&&<div style={{width:1,height:18,background:"var(--border)"}}/>}
            {!isMobile&&<span style={{color:"var(--text3)"}}>{prospects.length} prospects · {paiements.length} paiements</span>}
            {isMobile&&<span style={{color:"var(--text3)",fontSize:9}}>{prospects.length} prospects</span>}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:isMobile?12:24}}>
          {tab==="dashboard" &&<TabDashboard prospects={prospects} projets={projets} revenus={revenus} paiements={paiements} setTab={setTab} isMobile={isMobile}/>}
          {tab==="prospects"&&<TabProspects prospects={prospects} setProspects={setProspects} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr}/>}
          {tab==="projets"  &&<TabProjets projets={projets} setProjets={setProjets} addToast={addToast} paiements={paiements} setPaiements={setPaiements} setSyncing={setSyncing} setSyncErr={setSyncErr}/>}
          {tab==="paiements"&&<TabPaiements paiements={paiements} setPaiements={setPaiements} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr} isMobile={isMobile}/>}
          {tab==="revenus"  &&<TabRevenus revenus={revenus} setRevenus={setRevenus} addToast={addToast} setSyncing={setSyncing} setSyncErr={setSyncErr}/>}
          {tab==="messages" &&<TabMessages prospects={prospects} setProspects={setProspects}/>}
          {tab==="settings" &&<TabSettings addToast={addToast}/>}
        </div>
      </div>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
